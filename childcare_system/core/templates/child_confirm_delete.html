{% extends 'base.html' %}
{% block title %}Delete Child{% endblock %}
{% block content %}
<h2>Are you sure you want to delete {{ child.name }}?</h2>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, Delete</button>
    <a href="{% url 'child_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
