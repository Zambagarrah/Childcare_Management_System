{% extends 'base.html' %}
{% block title %}Child Form{% endblock %}
{% block content %}
<h2>Child Form</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Save</button>
</form>
<p class="text-muted">Note: Only Admins can assign caregivers.</p>
<p class="text-muted">Note: Only Admins & Parents can create Children.</p>
{% endblock %}
